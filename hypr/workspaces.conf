workspace = name:TV, monitor:HDMI-A-1, persistent:true

plugin {
    split-monitor-workspaces {
        count = 10
        monitor_priority = DP-2, DP-1, HDMI-A-1
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 0
        enable_wrapping = 1
    }
}

$ws=Workspaces
$d=[$ws|Navigation]
bindd = $mainMod, 1, $d navigate to workspace 1 , split-workspace, 1
bindd = $mainMod, 2, $d navigate to workspace 2 , split-workspace, 2
bindd = $mainMod, 3, $d navigate to workspace 3 , split-workspace, 3
bindd = $mainMod, 4, $d navigate to workspace 4 , split-workspace, 4
bindd = $mainMod, 5, $d navigate to workspace 5 , split-workspace, 5
bindd = $mainMod, 6, $d navigate to workspace 6 , split-workspace, 6
bindd = $mainMod, 7, $d navigate to workspace 7 , split-workspace, 7
bindd = $mainMod, 8, $d navigate to workspace 8 , split-workspace, 8
bindd = $mainMod, 9, $d navigate to workspace 9 , split-workspace, 9
bindd = $mainMod, 0, $d navigate to workspace TV , workspace, TV

$d=[$ws|Navigation|Relative workspace]
bindd = $mainMod Control, Right, $d change active workspace forwards  , split-cycleworkspaces, next
bindd = $mainMod Control, Left, $d change active workspace backwards , split-cycleworkspaces, prev

$d=[$ws|Navigation]
bindd = $mainMod Control, Down, $d navigate to the nearest empty workspace , workspace, empty

# Move focused window to a workspace
$d=[$ws|Move window to workspace]
bindd = $mainMod Shift, 1, $d move to workspace 1 , split-movetoworkspace, 1
bindd = $mainMod Shift, 2, $d move to workspace 2 , split-movetoworkspace, 2
bindd = $mainMod Shift, 3, $d move to workspace 3 , split-movetoworkspace, 3
bindd = $mainMod Shift, 4, $d move to workspace 4 , split-movetoworkspace, 4
bindd = $mainMod Shift, 5, $d move to workspace 5 , split-movetoworkspace, 5
bindd = $mainMod Shift, 6, $d move to workspace 6 , split-movetoworkspace, 6
bindd = $mainMod Shift, 7, $d move to workspace 7 , split-movetoworkspace, 7
bindd = $mainMod Shift, 8, $d move to workspace 8 , split-movetoworkspace, 8
bindd = $mainMod Shift, 9, $d move to workspace 9 , split-movetoworkspace, 9
bindd = $mainMod Shift, 0, $d move to workspace TV , movetoworkspace, TV

# Move focused window to a relative workspace
$d=[$ws]
bindd = $mainMod Control+Alt, Right, $d move window to next relative workspace , split-movetoworkspace, r+1
bindd = $mainMod Control+Alt, Left, $d move window to previous relative workspace , split-movetoworkspace, r-1


# Scroll through existing workspaces
$d=[$ws|Navigation]
bindd = $mainMod, mouse_down, $d next workspace, split-cycleworkspaces, next
bindd = $mainMod, mouse_up, $d previous workspace, split-cycleworkspaces, prev


# Move/Switch to special workspace (scratchpad)
$d=[$ws|Navigation|Special workspace]
bindd = $mainMod Shift, S, $d move to scratchpad  , movetoworkspace, special
bindd = $mainMod Alt, S, $d move to scratchpad (silent) , movetoworkspacesilent, special
bindd = $mainMod, S, $d toggle scratchpad ,  togglespecialworkspace

# Move focused window to a workspace silently
$d=[$ws|Navigation|Move window silently]
bindd = $mainMod Alt, 1, $d move to workspace 1  (silent), split-movetoworkspacesilent, 1
bindd = $mainMod Alt, 2, $d move to workspace 2  (silent), split-movetoworkspacesilent, 2
bindd = $mainMod Alt, 3, $d move to workspace 3  (silent), split-movetoworkspacesilent, 3
bindd = $mainMod Alt, 4, $d move to workspace 4  (silent), split-movetoworkspacesilent, 4
bindd = $mainMod Alt, 5, $d move to workspace 5  (silent), split-movetoworkspacesilent, 5
bindd = $mainMod Alt, 6, $d move to workspace 6  (silent), split-movetoworkspacesilent, 6
bindd = $mainMod Alt, 7, $d move to workspace 7  (silent), split-movetoworkspacesilent, 7
bindd = $mainMod Alt, 8, $d move to workspace 8  (silent), split-movetoworkspacesilent, 8
bindd = $mainMod Alt, 9, $d move to workspace 9  (silent), split-movetoworkspacesilent, 9
bindd = $mainMod Alt, 0, $d move to workspace TV (silent), movetoworkspacesilent, TV
